<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">Dense Froxel Grid and Sparse Froxel List</title>
  <desc id="desc">A precise frustum-based comparison. Dense keeps every froxel in every depth slice. Sparse keeps only occupied froxels in a packed list.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <style>
      .panel { fill: url(#bg); stroke: #27364f; stroke-width: 2; }
      .title { font: 700 25px Inter, Segoe UI, Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 15px Inter, Segoe UI, Arial, sans-serif; fill: #9fb0c8; }
      .label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #e2e8f0; }
      .small { font: 600 12px Inter, Segoe UI, Arial, sans-serif; fill: #93a4bd; }
      .tiny { font: 600 11px Inter, Segoe UI, Arial, sans-serif; fill: #7dd3fc; }
      .frustum { fill: none; stroke: #75839a; stroke-width: 2; stroke-linejoin: round; }
      .ray { stroke: #53647c; stroke-width: 2; }
      .axis { stroke: #334155; stroke-width: 2; stroke-dasharray: 7 7; }
      .plane { fill: rgba(15, 23, 42, 0.58); stroke: #94a3b8; stroke-width: 1.6; }
      .grid { stroke: #64748b; stroke-width: 1; opacity: 0.75; }
      .denseCell { fill: rgba(96, 165, 250, 0.11); }
      .active { fill: rgba(34, 211, 238, 0.45); stroke: #22d3ee; stroke-width: 2; }
      .listBox { fill: #111827; stroke: #38bdf8; stroke-width: 1.5; }
      .listText { font: 600 13px Consolas, Menlo, monospace; fill: #dff7ff; }
      .note { font: 600 13px Inter, Segoe UI, Arial, sans-serif; fill: #cbd5e1; }
      .callout { fill: #101827; stroke: #334155; stroke-width: 1.2; }
      .cyanLine { stroke: #38bdf8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .camera { fill: #f8fafc; stroke: #38bdf8; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1280" height="620" fill="#07101f"/>
  <rect x="34" y="34" width="582" height="552" rx="16" class="panel"/>
  <rect x="664" y="34" width="582" height="552" rx="16" class="panel"/>

  <text x="64" y="78" class="title">Dense Froxel Grid</text>
  <text x="64" y="104" class="subtitle">Every cell exists in every depth slice</text>
  <text x="694" y="78" class="title">Sparse Froxel List</text>
  <text x="694" y="104" class="subtitle">Only occupied cells are packed into a list</text>

  <!-- Left panel: dense frustum -->
  <g transform="translate(0,0)">
    <path d="M91 320 L150 244 L512 92 M91 320 L152 392 L522 510 M91 320 L150 244 L152 392 M512 92 L522 510" class="frustum"/>
    <line x1="91" y1="320" x2="526" y2="301" class="axis"/>
    <circle cx="91" cy="320" r="14" class="camera"/>
    <text x="61" y="354" class="small">camera</text>

    <!-- z0 -->
    <g>
      <polygon points="139,270 167,258 169,378 141,391" class="plane denseCell"/>
      <line x1="146" y1="267" x2="148" y2="388" class="grid"/>
      <line x1="153" y1="264" x2="155" y2="385" class="grid"/>
      <line x1="160" y1="261" x2="162" y2="382" class="grid"/>
      <line x1="140" y1="300" x2="168" y2="288" class="grid"/>
      <line x1="140" y1="335" x2="169" y2="322" class="grid"/>
      <line x1="141" y1="368" x2="169" y2="356" class="grid"/>
      <text x="136" y="244" class="tiny">z0</text>
    </g>
    <!-- z1 -->
    <g>
      <polygon points="218,238 270,216 275,417 222,442" class="plane denseCell"/>
      <line x1="231" y1="232" x2="235" y2="436" class="grid"/>
      <line x1="244" y1="227" x2="248" y2="430" class="grid"/>
      <line x1="257" y1="221" x2="262" y2="424" class="grid"/>
      <line x1="219" y1="288" x2="272" y2="265" class="grid"/>
      <line x1="220" y1="339" x2="273" y2="315" class="grid"/>
      <line x1="221" y1="390" x2="274" y2="366" class="grid"/>
      <text x="217" y="209" class="tiny">z1</text>
    </g>
    <!-- z2 -->
    <g>
      <polygon points="317,196 405,159 414,461 325,504" class="plane denseCell"/>
      <line x1="339" y1="187" x2="347" y2="493" class="grid"/>
      <line x1="361" y1="178" x2="369" y2="483" class="grid"/>
      <line x1="383" y1="168" x2="392" y2="472" class="grid"/>
      <line x1="319" y1="271" x2="407" y2="233" class="grid"/>
      <line x1="321" y1="346" x2="410" y2="309" class="grid"/>
      <line x1="323" y1="423" x2="412" y2="385" class="grid"/>
      <text x="317" y="151" class="tiny">z2</text>
    </g>
    <!-- z3 -->
    <g>
      <polygon points="445,142 558,94 570,512 456,566" class="plane denseCell"/>
      <line x1="473" y1="130" x2="484" y2="553" class="grid"/>
      <line x1="501" y1="118" x2="513" y2="540" class="grid"/>
      <line x1="529" y1="106" x2="541" y2="526" class="grid"/>
      <line x1="448" y1="246" x2="561" y2="197" class="grid"/>
      <line x1="451" y1="351" x2="564" y2="302" class="grid"/>
      <line x1="454" y1="456" x2="567" y2="407" class="grid"/>
      <text x="445" y="88" class="tiny">z3</text>
    </g>

    <rect x="70" y="505" width="330" height="42" rx="8" class="callout"/>
    <text x="86" y="532" class="note">Same tile count per slice; cell size grows with distance</text>
  </g>

  <!-- Right panel: sparse frustum -->
  <g transform="translate(630,0)">
    <path d="M91 320 L150 244 L512 92 M91 320 L152 392 L522 510 M91 320 L150 244 L152 392 M512 92 L522 510" class="frustum"/>
    <line x1="91" y1="320" x2="526" y2="301" class="axis"/>
    <circle cx="91" cy="320" r="14" class="camera"/>
    <text x="61" y="354" class="small">camera</text>

    <g opacity="0.45">
      <polygon points="139,270 167,258 169,378 141,391" class="plane"/>
      <polygon points="218,238 270,216 275,417 222,442" class="plane"/>
      <polygon points="317,196 405,159 414,461 325,504" class="plane"/>
      <polygon points="445,142 558,94 570,512 456,566" class="plane"/>
      <text x="136" y="244" class="tiny">z0</text>
      <text x="217" y="209" class="tiny">z1</text>
      <text x="317" y="151" class="tiny">z2</text>
      <text x="445" y="88" class="tiny">z3</text>
    </g>

    <!-- active sparse froxels -->
    <polygon points="153,300 160,297 161,329 154,332" class="active"/>
    <polygon points="235,341 248,335 249,386 236,392" class="active"/>
    <polygon points="362,253 384,244 386,320 364,330" class="active"/>
    <polygon points="503,352 531,340 534,445 506,458" class="active"/>

    <rect x="396" y="176" width="158" height="172" rx="10" class="listBox"/>
    <text x="414" y="205" class="label">Packed list</text>
    <text x="414" y="237" class="listText">Froxel(2,1,0)</text>
    <text x="414" y="267" class="listText">Froxel(1,2,1)</text>
    <text x="414" y="297" class="listText">Froxel(3,1,2)</text>
    <text x="414" y="327" class="listText">Froxel(2,2,3)</text>

    <path d="M161 315 C245 300, 315 238, 396 234" class="cyanLine"/>
    <path d="M249 366 C315 360, 350 266, 396 264" class="cyanLine"/>
    <path d="M386 285 C410 284, 382 294, 396 294" class="cyanLine"/>
    <path d="M532 395 C570 390, 580 326, 554 322" class="cyanLine"/>

    <rect x="70" y="505" width="330" height="42" rx="8" class="callout"/>
    <text x="86" y="532" class="note">Same frustum space, but only occupied froxels are stored</text>
  </g>
</svg>
