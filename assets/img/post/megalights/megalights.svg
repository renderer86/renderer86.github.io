<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Pencil sketch of a rendered world filled with hundreds of lights">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" seed="12"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.09"/>
      </feComponentTransfer>
    </filter>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.032" numOctaves="3" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <radialGradient id="grayGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="0.22" stop-color="#d8d8d8" stop-opacity="0.65"/>
      <stop offset="0.7" stop-color="#7f7f7f" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#7f7f7f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floorShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <pattern id="hatchA" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(28)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#202020" stroke-width="1" opacity="0.16"/>
    </pattern>
    <pattern id="hatchB" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(-34)">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#202020" stroke-width="1" opacity="0.11"/>
    </pattern>
    <pattern id="tinyLights" width="42" height="34" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="9" r="1.8" fill="#1f1f1f" opacity="0.58"/>
      <circle cx="24" cy="18" r="1.4" fill="#1f1f1f" opacity="0.42"/>
      <circle cx="36" cy="6" r="1.2" fill="#1f1f1f" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

