      <path d="M1318 655C1241 626 1162 606 1046 611" fill="none" stroke="#3e8ea0" stroke-width="1.6" opacity="0.65" marker-end="url(#arrow)"/>

      <path d="M1066 514C1106 498 1135 490 1160 486" fill="none" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.7"/>
      <path d="M1066 624C1102 630 1131 641 1160 662" fill="none" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.7"/>
