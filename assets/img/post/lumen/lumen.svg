<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-label="Pencil sketch diagram of Lumen geometry, mesh cards, surface cache, and screen probe gather">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" seed="31"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.032" numOctaves="3" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.1"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="atlasFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="probeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#dffaff" stop-opacity="0.85"/>
      <stop offset="0.42" stop-color="#94dce8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#94dce8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hatchA" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(28)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#202020" stroke-width="1" opacity="0.13"/>
    </pattern>
    <pattern id="hatchB" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#202020" stroke-width="1" opacity="0.10"/>
    </pattern>
    <pattern id="atlasGrid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#202020" stroke-width="1.1" opacity="0.28"/>
      <path d="M21 0V42M0 21H42" fill="none" stroke="#202020" stroke-width="0.7" opacity="0.10"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 4L0 8Z" fill="#202020"/>
    </marker>
  </defs>

  <rect width="1536" height="1024" fill="#ffffff"/>

  <g filter="url(#rough)" stroke="#202020" stroke-linecap="round" stroke-linejoin="round">
    <text x="126" y="92" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="700" fill="#202020" opacity="0.82">Geometry</text>
    <text x="492" y="92" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="700" fill="#202020" opacity="0.82">Mesh Cards</text>
    <text x="820" y="92" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="700" fill="#202020" opacity="0.82">Surface Cache</text>
    <text x="1160" y="92" font-family="JetBrains Mono, Consolas, monospace" font-size="22" font-weight="700" fill="#202020" opacity="0.82">Screen Probe Gather</text>

    <path d="M390 100C430 112 458 126 482 151" fill="none" stroke-width="2" marker-end="url(#arrow)" opacity="0.65"/>
    <path d="M706 100C748 114 781 130 812 154" fill="none" stroke-width="2" marker-end="url(#arrow)" opacity="0.65"/>
