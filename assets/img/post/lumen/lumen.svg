      <path d="M728 402C774 422 806 447 836 482" fill="none" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.68"/>
      <path d="M762 676C790 648 805 627 822 606" fill="none" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.68"/>
      <path d="M700 742C748 728 785 714 822 686" fill="none" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.68"/>
